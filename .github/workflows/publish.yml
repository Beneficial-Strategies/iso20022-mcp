name: Publish to MCP Registry

on:
  push:
    branches: [main]
    paths:
      - server.json

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: npm install -g @modelcontextprotocol/mcp-publisher

      - name: Publish to registry
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
        run: |
          if [ -z "$MCP_REGISTRY_TOKEN" ]; then
            echo "MCP_REGISTRY_TOKEN not configured — skipping publish"
            exit 0
          fi
          mcp-publisher publish --server server.json
