# NOTE: This workflow targets the vendor-neutral MCP registry (registry.modelcontextprotocol.io).
# It is NOT how you get listed in Claude's integrations marketplace.
#
# To publish to Anthropic/Claude users (the primary goal):
#   Submit via https://clau.de/plugin-directory-submission
#   The .claude-plugin/plugin.json in this repo is the artifact they need.
#   No automation required — it's a one-time form submission and review process.
#
# This workflow is a future/secondary concern for cross-platform discoverability
# (Cursor, Windsurf, etc.). It requires:
#   1. Confirming the mcp-publisher CLI works against the official registry
#      (the registry API is currently read-only; publishing may require a PR to
#      https://github.com/modelcontextprotocol/registry instead)
#   2. Obtaining an MCP_REGISTRY_TOKEN and adding it as a repo secret

name: Publish to MCP Registry

on:
  push:
    branches: [main]
    paths:
      - server.json

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: npm install -g @modelcontextprotocol/mcp-publisher

      - name: Publish to registry
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
        run: |
          if [ -z "$MCP_REGISTRY_TOKEN" ]; then
            echo "MCP_REGISTRY_TOKEN not configured — skipping publish"
            exit 0
          fi
          mcp-publisher publish --server server.json
